name: Orders Build Report

on:
  push:
    branches: [main]
    paths:
      - 'src/orders/**'
      - 'orders/**'
      - 'public/orders-manifest.webmanifest'
      - 'vite.config.ts'
      - '.github/workflows/orders-build-report.yml'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Type check and build
        id: validate
        continue-on-error: true
        run: npm run check && npm run build
      - name: Publish build report
        if: always()
        env:
          VALIDATION_OUTCOME: ${{ steps.validate.outcome }}
        run: |
          mkdir -p /tmp/orders-build-report
          printf '{"commit":"%s","outcome":"%s","run_id":"%s","created_at":"%s"}\n' "$GITHUB_SHA" "$VALIDATION_OUTCOME" "$GITHUB_RUN_ID" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > /tmp/orders-build-report/orders.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan orders-build-report-work
          git rm -rf .
          cp /tmp/orders-build-report/orders.json orders.json
          git add orders.json
          git commit -m "Update orders build report [skip ci]"
          git push --force origin HEAD:build-report
      - name: Fail when validation failed
        if: steps.validate.outcome != 'success'
        run: exit 1
